<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer" />
    <title>Silent Tech | API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0c0c0c; 
            color: #ececec; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* Clean Professional Grey Grid */
        .bg-grid {
            position: fixed; inset: 0; z-index: -1;
            background-size: 32px 32px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        }

        /* macOS Style Window Structure */
        .mac-window {
            background: #151515;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .mac-header {
            background: #1e1e1e;
            border-bottom: 1px solid #2a2a2a;
            padding: 12px 16px;
            display: flex;
            align-items: center;
        }
        .mac-dots { display: flex; gap: 6px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-red { background-color: #ff5f56; }
        .dot-yellow { background-color: #ffbd2e; }
        .dot-green { background-color: #27c93f; }
        .mac-title { flex: 1; text-align: center; font-size: 12px; color: #888; font-weight: 500; margin-right: 48px;}

        /* Smooth Inputs */
        .input-clean {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #fff;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-clean:focus {
            outline: none;
            border-color: #666;
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1);
        }

        /* Subtle Smooth Animations */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        /* Code Font */
        .code-font { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col items-center py-10 px-4 md:px-8">

    <div class="bg-grid"></div>

    <!-- Minimal Header -->
    <div class="max-w-5xl w-full mb-10 text-center">
        <h1 class="text-3xl font-semibold text-white tracking-tight mb-2">Silent Tech</h1>
        <p class="text-gray-400 text-sm font-medium">Enterprise Image Routing & Delivery API</p>
    </div>

    <main class="w-full max-w-5xl grid grid-cols-1 md:grid-cols-12 gap-8 z-10">
        
        <!-- Left Panel: Controls -->
        <div class="md:col-span-5 flex flex-col gap-6">
            <div class="mac-window">
                <div class="mac-header">
                    <div class="mac-dots">
                        <div class="dot dot-red"></div>
                        <div class="dot dot-yellow"></div>
                        <div class="dot dot-green"></div>
                    </div>
                    <div class="mac-title">request_config.json</div>
                </div>
                
                <div class="p-6 space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Authentication Key</label>
                        <input type="password" id="test-key" value="SILENT_TECH_2026" class="w-full input-clean p-2.5 text-sm code-font">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Fetch Mode</label>
                        <select id="test-mode" onchange="toggleIdInput()" class="w-full input-clean p-2.5 text-sm cursor-pointer">
                            <option value="random">Randomize (Gacha Pull)</option>
                            <option value="specific">Target Specific ID</option>
                        </select>
                    </div>

                    <div id="id-input-container" class="hidden fade-in">
                        <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wide">Target Asset ID</label>
                        <input type="text" id="test-id" placeholder="e.g. 61a7015099f..." class="w-full input-clean p-2.5 text-sm code-font">
                    </div>

                    <button onclick="executeTest()" id="execute-btn" class="w-full bg-[#ececec] hover:bg-white text-black font-semibold py-2.5 rounded-lg transition-colors mt-2 text-sm">
                        Execute Request
                    </button>
                </div>
            </div>
        </div>

        <!-- Right Panel: Output & Render -->
        <div class="md:col-span-7 flex flex-col gap-6">
            
            <!-- Code Window -->
            <div class="mac-window h-fit">
                <div class="mac-header">
                    <div class="mac-dots">
                        <div class="dot dot-red"></div>
                        <div class="dot dot-yellow"></div>
                        <div class="dot dot-green"></div>
                    </div>
                    <div class="mac-title" id="response-status">Waiting for request...</div>
                </div>
                <div class="p-0 bg-[#0a0a0a]">
                    <pre id="json-result" class="p-5 code-font text-sm text-gray-300 overflow-x-auto min-h-[160px] leading-relaxed">
{
  "status": "idle",
  "connection": "ready"
}</pre>
                </div>
            </div>

            <!-- Image Render Window -->
            <div id="visual-render" class="mac-window hidden fade-in">
                <div class="mac-header border-b border-[#2a2a2a]/50 bg-[#151515]">
                    <div class="mac-dots">
                        <div class="dot dot-red"></div>
                        <div class="dot dot-yellow"></div>
                        <div class="dot dot-green"></div>
                    </div>
                    <div class="mac-title">asset_preview.png</div>
                </div>
                
                <div class="p-6 flex flex-col sm:flex-row gap-6 items-center sm:items-start bg-[#111]">
                    <!-- Image -->
                    <div class="w-40 h-60 rounded-lg overflow-hidden border border-[#333] shadow-lg flex-shrink-0 bg-[#0a0a0a]">
                        <img id="render-img" src="" class="w-full h-full object-cover">
                    </div>
                    
                    <!-- Metadata -->
                    <div class="flex flex-col w-full py-2">
                        <div class="text-[11px] text-gray-500 code-font mb-1" id="render-id"></div>
                        <h2 class="text-2xl font-semibold text-white mb-1" id="render-name"></h2>
                        <p class="text-sm text-gray-400 mb-5" id="render-series"></p>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-[#1a1a1a] rounded border border-[#2a2a2a] p-3">
                                <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Tier</div>
                                <div class="text-sm font-medium text-white" id="render-tier"></div>
                            </div>
                            <div class="bg-[#1a1a1a] rounded border border-[#2a2a2a] p-3">
                                <div class="text-[10px] text-gray-500 uppercase tracking-widest mb-1">Maker</div>
                                <div class="text-sm font-medium text-white" id="render-maker"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function toggleIdInput() {
            const mode = document.getElementById('test-mode').value;
            if (mode === 'specific') {
                document.getElementById('id-input-container').classList.remove('hidden');
            } else {
                document.getElementById('id-input-container').classList.add('hidden');
            }
        }

        function syntaxHighlight(json) {
            if (typeof json != 'string') { json = JSON.stringify(json, undefined, 2); }
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                var cls = 'text-[#79c0ff]'; // number
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) { cls = 'text-[#d2a8ff] font-medium'; } // key
                    else { cls = 'text-[#a5d6ff]'; } // string
                } else if (/true|false/.test(match)) { cls = 'text-[#ff7b72]'; } // boolean
                else if (/null/.test(match)) { cls = 'text-gray-500'; } // null
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }

        async function executeTest() {
            const btn = document.getElementById('execute-btn');
            const statusText = document.getElementById('response-status');
            const jsonView = document.getElementById('json-result');
            const visualRender = document.getElementById('visual-render');
            
            const key = document.getElementById('test-key').value;
            const mode = document.getElementById('test-mode').value;
            const cardId = document.getElementById('test-id').value;

            let url = window.location.origin + `/api/card?key=${encodeURIComponent(key)}`;
            if (mode === 'random') {
                url += `&random=true`;
            } else {
                if (!cardId) {
                    jsonView.innerHTML = '<span class="text-[#ff7b72]">Error: Target ID is required.</span>';
                    return;
                }
                url += `&id=${encodeURIComponent(cardId)}`;
            }
            url += `&t=${Date.now()}`;

            btn.innerText = "Processing...";
            btn.classList.add('opacity-70');
            visualRender.classList.add('hidden');
            jsonView.innerHTML = '<span class="text-gray-500">Fetching data...</span>';
            statusText.innerText = "GET /api/card";

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                statusText.innerText = response.ok ? `Status: 200 OK` : `Status: ${response.status} ERROR`;
                jsonView.innerHTML = syntaxHighlight(data);

                if (response.ok && data.image) {
                    document.getElementById('render-img').src = data.image;
                    document.getElementById('render-name').innerText = data.name;
                    document.getElementById('render-series').innerText = data.series;
                    document.getElementById('render-tier').innerText = data.tier;
                    document.getElementById('render-maker').innerText = data.maker || 'Official';
                    document.getElementById('render-id').innerText = data.id;
                    
                    // Smooth reveal
                    setTimeout(() => {
                        visualRender.classList.remove('hidden');
                    }, 100);
                }

            } catch (error) {
                statusText.innerText = `NETWORK_ERROR`;
                jsonView.innerHTML = `<span class="text-[#ff7b72]">${error.message}</span>`;
            }

            btn.innerText = "Execute Request";
            btn.classList.remove('opacity-70');
        }
    </script>
</body>
</html>
